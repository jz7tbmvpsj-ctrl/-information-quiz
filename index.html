<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>정보 OX 퀴즈</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>📚 정보 OX 퀴즈</h1>

  <div id="quizBox">
    <h2 id="question">문제가 여기에 표시됩니다.</h2>

    <div class="buttons">
      <button onclick="answer(true)">⭕ O</button>
      <button onclick="answer(false)">❌ X</button>
    </div>

    <p id="result"></p>

    <button id="nextBtn" onclick="nextQuestion()">다음 문제</button>
  </div>

  <div id="finish" style="display:none;">
    <h2>퀴즈 종료!</h2>
    <p id="score"></p>
    <button onclick="restartQuiz()">다시 풀기</button>
  </div>
</div>

<script src="script.js"></script>

</body>
</html>
